; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nodemcuv2
description = Smart Parking WebSocket server (ESP8266)

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DDEBUG_ESP_PORT=Serial
    -Wall

; Note: Servo is bundled with the ESP8266 Arduino core — no lib_dep needed.
lib_deps =
    links2004/WebSockets @ ^2.4.1
    bblanchon/ArduinoJson @ ^7.0.4

; Uncomment to flash via OTA once the device is on your network
; upload_protocol = espota
; upload_port = 192.168.0.1
